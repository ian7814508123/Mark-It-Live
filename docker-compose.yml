version: '3.8'

services:
  mark-it-live:
    build:
      context: .
      dockerfile: Dockerfile
    image: mark-it-live:latest
    container_name: mark-it-live
    ports:
      - "8080:80"
    restart: unless-stopped
    
    # 健康檢查（可選）
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    # 資源限制（可選，防止資源濫用）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>第三方開源授權聲明 | Mark It Live —  Mark It Live</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f9fafb;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        h1 {
            color: #00416A;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px 0;
        }

        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }

        pre {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.85em;
            margin-bottom: 30px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 0.8em;
        }

        a {
            color: #00416A;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Markdown 渲染樣式 */
        #content h4 {
            color: #1e293b;
            margin-top: 30px;
            margin-bottom: 10px;
            font-size: 1.2em;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 5px;
        }

        #content ul {
            margin-bottom: 15px;
            padding-left: 20px;
            color: #475569;
        }

        #content li {
            margin-bottom: 5px;
        }

        #content code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>第三方開源授權聲明 (Third-Party Licenses)</h1>
        <p>本專案使用了多項優秀的開源軟體與套件，特此致謝。以下為這些第三方軟體的詳細授權聲明：</p>

        <div id="content">
            <div class="loading">正在載入授權聲明... (Loading licenses...)</div>
        </div>

        <div class="footer">
            <p>© 2026 Mark It Live. <a href="/" onclick="window.close(); return false;">關閉本頁 (Close Window)</a></p>
        </div>
    </div>

    <!-- 載入 Marked.js 來發揮我們的 Markdown 渲染優勢 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentDiv = document.getElementById('content');
            fetch('THIRD-PARTY-NOTICES.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('無法載入授權聲明檔案。。');
                    }
                    return response.text();
                })
                .then(text => {
                    // 使用 marked 將 Markdown 轉換為 HTML
                    contentDiv.innerHTML = marked.parse(text);
                })
                .catch(error => {
                    contentDiv.innerHTML = `<div class="error">錯誤：${error.message}</div>`;
                });
        });
    </script>
</body>

</html>
